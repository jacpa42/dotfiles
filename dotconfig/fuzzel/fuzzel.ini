[main]
font=JetBrainsMono Nerd Font:weight=medium:size=11:fontfeatures=cv11:fontfeatures=ss03:fontfeatures=ss01:fontfeatures=liga, Noto Color Emoji:weight=medium:size=11
dpi-aware=yes
match-mode=fzf
icons-enabled=no
terminal='footclient -a '{cmd}' -T '{cmd}' {cmd}'
width=60
horizontal-pad=8
vertical-pad=8
render-workers=12
match-workers=12
enable-mouse=false

[colors]
background=000000ff #000000ff
text=c1c1c1ff #c1c1c1ff
message=974b46ff #974b46ff
prompt=5f8787ff #5f8787ff
placeholder=8e8e8eff #8e8e8eff
input=c1c1c1ff #c1c1c1ff
match=974b46ff #974b46ff
selection=000000ff #000000ff
selection-text=5f8787ff #5f8787ff
selection-match=974b46ff #974b46ff
counter=000000ff #000000ff
border=000000ff #000000ff

[border]
width=0
radius=0
selection-radius=0

[dmenu]
exit-immediately-if-empty=false
