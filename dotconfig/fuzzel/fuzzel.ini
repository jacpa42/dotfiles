[main]
font=JetBrainsMono Nerd Font:weight=medium:size=11:fontfeatures=cv11:fontfeatures=ss03:fontfeatures=ss01:fontfeatures=liga, Noto Color Emoji:weight=medium:size=11
dpi-aware=yes
match-mode=fzf
icons-enabled=no
terminal='footclient -a '{cmd}' -T '{cmd}' {cmd}'
width=60
horizontal-pad=8
vertical-pad=8
render-workers=12
match-workers=12
enable-mouse=false

[colors]
background=090618e6 #090618 e6
text=dcd7baff #dcd7ba ff
message=c34043ff #c34043 ff
prompt=957fb8ff #957fb8 ff
placeholder=1d202fff #1d202f ff
input=dcd7baff #dcd7ba ff
match=c34043ff #c34043 ff
selection=090618ff #090618 ff
selection-text=957fb8ff #957fb8 ff
selection-match=c34043ff #c34043 ff
counter=7e9cd8ff #7e9cd8 ff
border=090618e6 #090618 e6

[border]
width=0
radius=0
selection-radius=0

[dmenu]
exit-immediately-if-empty=false
