$mod = SUPER

env = WALLPAPER_DIRECTORY,$PROJDIR/muur_papier
env = DEFAULT_WALLPAPER,fuji-clay-banks
env = ANKI_WAYLAND,1
env = AQ_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11,*
env = GTK_THEME,Adwaita
env = MPD_HOST,$XDG_RUNTIME_DIR/mpd_socks
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = RADV_PERFTEST,video_decode,video_encode
env = SDL_VIDEODRIVER,wayland
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,catppuccin-mocha-mauve-cursors
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,catppuccin-mocha-mauve-cursors
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = CHAT_WORKSPACE,1
env = WEB_WORKSPACE,2
env = TERMINAL_WORKSPACE,3
env = STEAM_WORKSPACE,4

execr-once = hyprstartup

# Main monitor
monitorv2 {
    output = DP-1
    mode = 2560x1440@240
    position = 0x0
    scale = 1
    transform = 0
}
monitorv2 {
    output = DP-5
    mode = 3840x2160@30
    position = 4096x0
    scale = 1
    transform = 0
}
monitorv2 {
    output = HDMI-A-1
    mode = 3840x2160@60
    position = -3840x0
    scale = 1
    transform = 0
}
monitorv2 {
    output = eDP-1
    mode = 2560x1440@165
    position = 0x0
    scale = 1
    transform = 0
}

# Laptop monitor framework
monitorv2 {
    output = eDP-2
    mode = 2560x1600@165
    position = 0x0
    scale = 1
    transform = 0
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(e82424ff)
    col.inactive_border = rgba(24253799)
    layout = scrolling
    allow_tearing = true
}

input {
    follow_mouse = 1
    repeat_rate = 60
    repeat_delay = 200
}

device {
    name = razer-razer-blade-keyboard
    kb_layout = gb
    kb_options = caps:escape
}

device {
    name = framework-laptop-16-keyboard-module---ansi-keyboard
    kb_options = caps:escape
}

ecosystem {
	no_update_news = false
	no_donation_nag = false
}

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.98
    follow_min_visible = 0.98
    focus_fit_method = 0
    follow_focus = true
    direction = right
}
# Scrolling layout mods
binde = $mod, R, layoutmsg, focus right
binde = $mod, E, layoutmsg, focus left
binde = $mod ALT, R, layoutmsg, swapcol r
binde = $mod ALT, E, layoutmsg, swapcol l

decoration {
    rounding = 0
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1

    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = yes
    bezier = easeOutQuint,0.23,1,0.32,1.0
    bezier = easeInOutCubic,0.65,0.05,0.36,1.0
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    $fast=1.0
    $medium=1.7
    $slow=2.4

    animation = global, 1, $fast, quick
    animation = fade, 0, $fast, quick # This is so color_picker doesnt break lmao
    animation = windows, 1, $medium, easeOutQuint, slide
    animation = workspaces, 0, $slow, easeOutQuint, slidevert
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    font_family=JetBrainsMono Nerd Font
    splash_font_family=JetBrainsMono Nerd Font
    force_default_wallpaper = 0
    vfr = true
    vrr = 0
    disable_autoreload = true
    on_focus_under_fullscreen = 1
    enable_anr_dialog = false
}

render {
    direct_scanout = 0
}

device {
    name = epic-mouse-v1
    sensitivity = 0
}

cursor {
    hide_on_key_press = true
    inactive_timeout = 0.5
    warp_on_change_workspace = 0
    zoom_factor = 1
}

# Window rules
windowrule {
    name=window can grab the entire screen on start-up and tile
    match:class=*
    suppress_event=maximize
    decorate=false
    tile=true
}
windowrule {
    name=Spotify rules
    match:class=spotify
    workspace=$CHAT_WORKSPACE
    opacity=0.9
}
windowrule {
    name=Tiled map editor rules
    match:class=org.mapeditor.tiled
    workspace=$TERMINAL_WORKSPACE
}
windowrule {
    name=Qelectrotech rules
    match:class=(?i).*qelectrotech
    workspace=$WEB_WORKSPACE
}
windowrule {
    name=Aseprite rules
    match:class=Aseprite
    workspace=$TERMINAL_WORKSPACE
    tile=true
}
windowrule {
    name=Discord rules
    match:class=(Discord|WebCord|vesktop)
    workspace=$CHAT_WORKSPACE
    tile=true
}
windowrule {
    name=Rules for steam games
    match:class=.*steam_app.*
    workspace=$STEAM_WORKSPACE
}
windowrule {
    name=Steam popup window rules
    match:class=steam
    workspace=$STEAM_WORKSPACE
    opacity=0.9
    float=true
}
windowrule {
    name=Steam popup window rules
    match:title='Sign in to Steam'
    workspace=$STEAM_WORKSPACE
    center=true
    opacity=0.9
    float=true
}
windowrule {
    name=Main steam window rules
    match:title=^(Steam)$
    workspace=$STEAM_WORKSPACE
    tile=true
}
windowrule {
    name=browser rules
    match:class=(firefox|org.qutebrowser.qutebrowser|librewolf)
    workspace=$WEB_WORKSPACE
    opacity=1.0
}
windowrule {
    name=footclient rules
    match:class=footclient
    workspace=$TERMINAL_WORKSPACE
    tile=true
}
windowrule {
    name=Neovim rules
    match:class=nvim.*
    workspace=$TERMINAL_WORKSPACE
    tile=true
}
windowrule {
    name=Foot rules
    match:class=(foot|tmux|footclient)
    workspace=$TERMINAL_WORKSPACE
    tile=true
}
windowrule {
    name=fixes davinci popup jank
    match:class=^(resolve)$
    float=true
    workspace=$WEB_WORKSPACE
}
windowrule {
    name=tile the main davinci window
    match:title=.*DaVinci Resolve Studio.*
    tile=true
    workspace=$WEB_WORKSPACE
}
windowrule {
    name=inkscape rules
    match:class=org.inkscape.Inkscape
    workspace=$WEB_WORKSPACE
}
windowrule {
    name=Tricky towers fullscreen
    match:title=Tricky Towers
    workspace=$STEAM_WORKSPACE
    fullscreen=true
}
windowrule {
    name=small popup window rules
    match:class=(hyprland-share-picker)
    border_size=0
    center=1
    float=true
    no_anim=true
    pin=true
    size=monitor_w*0.6 monitor_h*0.6
    stay_focused=true
}
windowrule {
    name=Terminal app rules
    match:class=(tpopup|rmpc|yazi.*|termfilechooser|btop|lazygit|wiremix|bluetoothctl)
    border_size=0
    center=1
    float=true
    no_anim=true
    pin=true
    size=monitor_w*0.9 monitor_h*0.9
    stay_focused=true
}
windowrule {
    name=anki rules
    match:class=anki
    tile=true
    workspace=$WEB_WORKSPACE
}
windowrule {
    name=pinentry stuff
    match:class=Pinentry-gtk
    pin=on
    stay_focused=true
    no_screen_share=true
}

# Keybind names
# https://raw.githubusercontent.com/xkbcommon/libxkbcommon/refs/heads/master/include/xkbcommon/xkbcommon-keysyms.h

bind = $mod, T, togglefloating,
bind = $mod, W, killactive,
bind = $mod, RETURN, fullscreen,
bind = $mod ALT CTRL SHIFT, ESCAPE, exec, loginctl kill-user $(whoami)
bind = $mod, SPACE, exec, pkill fuzzel || fuzzel
bind = $mod ALT, SPACE, exec, focus_window
bind = $mod, P, exec, passwords --copy
bind = $mod, O, exec, supermenu
bind = $mod, C, exec, color_picker
bind = $mod, X, exec, screenshot
bind = $mod, H, exec, firefox_history
bind = $mod, BACKSPACE, exec, footclient

bind = $mod ALT, H, exec, tmux_sessionizer home_session
bind = $mod, period, exec, tmux_sessionizer projects
bind = $mod ALT, period, focuswindow, class:tmux
bind = $mod, U, exec, tmux_sessionizer gitweb

bind = $mod, L, exec, sh -c '[ "$(hyprctl dispatch closewindow class:tpopup)" = ok ] || footclient -ET lazygit -a tpopup tmux_sessionizer git'
bind = $mod, B, exec, sh -c '[ "$(hyprctl dispatch closewindow class:tpopup)" = ok ] || footclient -ET btop -a tpopup btop'
bind = $mod, M, exec, sh -c '[ "$(hyprctl dispatch closewindow class:tpopup)" = ok ] || footclient -ET rmpc -a tpopup rmpc'
bind = $mod, Y, exec, sh -c '[ "$(hyprctl dispatch closewindow class:tpopup)" = ok ] || footclient -ET yazi -a tpopup yazi'

binde = $mod, V, exec, hyprwall
binde = $mod SHIFT, V, exec, hyprwall -r
bind = $mod ALT, V, exec, hyprwall -s $DEFAULT_WALLPAPER
binde = $mod CTRL, V, exec, hyprwall -R

bind = $mod, S, workspace, $CHAT_WORKSPACE
bind = $mod, D, workspace, $WEB_WORKSPACE
bind = $mod, F, workspace, $TERMINAL_WORKSPACE
bind = $mod, G, workspace, $STEAM_WORKSPACE
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9


bind = $mod ALT, S, movetoworkspace, $CHAT_WORKSPACE
bind = $mod ALT, D, movetoworkspace, $WEB_WORKSPACE
bind = $mod ALT, F, movetoworkspace, $TERMINAL_WORKSPACE
bind = $mod ALT, G, movetoworkspace, $STEAM_WORKSPACE
bind = $mod ALT, 1, movetoworkspace, 1
bind = $mod ALT, 2, movetoworkspace, 2
bind = $mod ALT, 3, movetoworkspace, 3
bind = $mod ALT, 4, movetoworkspace, 4
bind = $mod ALT, 5, movetoworkspace, 5
bind = $mod ALT, 6, movetoworkspace, 6
bind = $mod ALT, 7, movetoworkspace, 7
bind = $mod ALT, 8, movetoworkspace, 8
bind = $mod ALT, 9, movetoworkspace, 9

bindel = , XF86AudioRaiseVolume, exec, increase_volume
bindel = , XF86AudioLowerVolume, exec, decrease_volume
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindl  = , Print, exec, screenshot output
bindl  = , XF86Tools, exec, pkill fuzzel || fuzzel
bindl  = , XF86AudioPlay, exec, rmpc togglepause
bindl  = , XF86AudioPrev, exec, rmpc prev
bindl  = , XF86AudioNext, exec, rmpc next

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

gesture = 3, horizontal, workspace

workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-5
