$mod = SUPER

# picker/menu stuff
$hyprscripts=$DOTDIR/dotconfig/hypr/scripts
$firefox_history = $hyprscripts/pickers/firefox_history.sh
$passwords = $hyprscripts/pickers/passwords.sh
$supermenu = $hyprscripts/pickers/supermenu.sh
$screenshot = $hyprscripts/util/screenshot.sh
$color_picker = $hyprscripts/util/color_picker.sh

# wallpaper stuff
$default_wallpaper = fuji-clay-banks.jpg
$cyclewall = $hyprscripts/util/cyclewall.sh
$wallpaper_directory = $PROJDIR/muur_papier

# Workspace stuff
$browser_misc = 3
$terminal_workspace = 4

env = ANKI_WAYLAND,1
env = AQ_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1
env = CLUTTER_BACKEND,wayland
env = GDK_BACKEND,wayland,x11,*
env = GTK_THEME,Adwaita
env = MPD_HOST,$XDG_RUNTIME_DIR/mpd_socks
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = RADV_PERFTEST,video_decode,video_encode
env = SDL_VIDEODRIVER,wayland
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,catppuccin-mocha-mauve-cursors
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,catppuccin-mocha-mauve-cursors
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland

execr-once = $hyprscripts/startup.sh

# Main monitor
monitorv2 {
    output = DP-1
    mode = 2560x1440@240
    position = 0x0
    scale = 1
    transform = 0
}
monitorv2 {
    output = DP-5
    mode = 3840x2160@30
    position = -3840x0
    scale = 1
    transform = 0
}
monitorv2 {
    output = HDMI-A-1
    mode = 3840x2160@60
    position = -3840x0
    scale = 1
    transform = 0
}
monitorv2 {
    output = eDP-1
    mode = 2560x1440@165
    position = 0x0
    scale = 1
    transform = 0
}

# Laptop monitor framework
monitorv2 {
    output = eDP-2
    mode = 2560x1600@165
    position = 0x0
    scale = 1
    transform = 0
}


general {
    gaps_in = 2
    gaps_out = 0
    border_size = 2
    col.active_border = rgba(e82424ff)
    col.inactive_border = rgba(24253799)
    layout = scrolling
    allow_tearing = true
}

input {
    follow_mouse = 1
    repeat_rate = 60
    repeat_delay = 200
}

device {
    name = razer-razer-blade-keyboard
    kb_layout = gb
    kb_options = caps:escape
}

device {
    name = framework-laptop-16-keyboard-module---ansi-keyboard
    kb_options = caps:escape
}

ecosystem {
	no_update_news = false
	no_donation_nag = false
}


master {
  new_status = master
  new_on_top = true
  orientation = left
  drop_at_cursor = false
  mfact = 0.6
}
# Master layout mods
# bind = $mod, E, layoutmsg, rollnext
# bind = $mod, R, layoutmsg, rollprev
# bind = $mod ALT, E, cyclenext,
# bind = $mod ALT, R, cyclenext, prev
# bind = $mod SHIFT, E, layoutmsg, mfact -0.05
# bind = $mod SHIFT, R, layoutmsg, mfact +0.05

scrolling {
    fullscreen_on_one_column = true
    column_width = 0.98
    follow_min_visible = 0.98
    focus_fit_method = 0
    follow_focus = true
    direction = right
}
# Scrolling layout mods
binde = $mod, E, layoutmsg, focus left
binde = $mod, R, layoutmsg, focus right
binde = $mod ALT, E, layoutmsg, swapcol l
binde = $mod ALT, R, layoutmsg, swapcol r

decoration {
    rounding = 0
    active_opacity = 1
    inactive_opacity = 1
    fullscreen_opacity = 1

    shadow:enabled = false
    blur:enabled = false
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,0.23,1,0.32,1.0
    bezier = easeInOutCubic,0.65,0.05,0.36,1.0
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    $fast=1.0
    $medium=1.7
    $slow=2.4

    animation = global, 1, $fast, quick
    animation = fade, 0, $fast, quick # This is so color_picker doesnt break lmao
    animation = windows, 1, $medium, easeOutQuint, slide
    animation = workspaces, 0, $slow, easeOutQuint, slidevert
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    font_family=JetBrainsMono Nerd Font
    splash_font_family=JetBrainsMono Nerd Font
    force_default_wallpaper = 0
    vfr = true
    vrr = 0
    disable_autoreload = true
    on_focus_under_fullscreen = 1
}

render {
    direct_scanout = 0
}

device {
    name = epic-mouse-v1
    sensitivity = 0
}

cursor {
    hide_on_key_press = true
    inactive_timeout = 0.5
    warp_on_change_workspace = 0
    zoom_factor = 1
}

# Window rules
windowrule {
    name=window can grab the entire screen on start-up and tile
    match:class=*
    suppress_event=maximize
    tile=true
}
windowrule {
    name=Spotify rules
    match:class=spotify
    workspace=2
    opacity=0.9
}
windowrule {
    name=Tiled map editor rules
    match:class=org.mapeditor.tiled
    workspace=6
}
windowrule {
    name=Zathura rules
    match:class=org.pwmt.zathura
    workspace=5
}
windowrule {
    name=Qelectrotech rules
    match:class=(?i).*qelectrotech
    workspace=6
}
windowrule {
    name=Aseprite rules
    match:class=Aseprite
    workspace=6
    tile=true
}
windowrule {
    name=Discord rules
    match:class=(?i)discord
    workspace=1
    tile=true
}
windowrule {
    name=Rules for steam games
    match:class=.*steam_app.*
    workspace=5
}
windowrule {
    name=Steam popup window rules
    match:class=steam
    workspace=5
    opacity=0.9
    float=true
}
windowrule {
    name=Steam popup window rules
    match:title='Sign in to Steam'
    workspace=5
    center=true
    opacity=0.9
    float=true
}
windowrule {
    name=Main steam window rules
    match:title=^(Steam)$
    workspace=5
    tile=true
}
windowrule {
    name=qutebrowser rules
    match:class=org.qutebrowser.qutebrowser
    workspace=$browser_misc
    opacity=1.0
}
windowrule {
    name=firefox rules
    match:class=firefox
    workspace=$browser_misc
    opacity=1.0
}
windowrule {
    name=footclient rules
    match:class=footclient
    workspace=$terminal_workspace
    tile=true
}
windowrule {
    name=Foot rules
    match:class=foot
    workspace=$terminal_workspace
    tile=true
}
windowrule {
    name=fixes davinci popup jank
    match:class=^(resolve)$
    float=true
    workspace=6
}
windowrule {
    name=tile the main davinci window
    match:title=.*DaVinci Resolve Studio.*
    tile=true
    workspace=6
}
windowrule {
    name=some-name-for-this-rule
    match:class=org.inkscape.Inkscape
    workspace=1
}
windowrule {
    name=Tricky towers fullscreen
    match:title=Tricky Towers
    workspace=5
    float=true
    fullscreen=true
}
windowrule {
    name=Terminal popup rules
    match:class=(wiremix|impala|bluetoothctl|hyprland-share-picker)
    border_size=0
    center=1
    float=true
    no_anim=true
    pin=true
    size=monitor_w*0.6 monitor_h*0.6
    stay_focused=true
}
windowrule {
    name=Terminal app rules
    match:class=(rmpc|btop|nvim.*|yazi.*|termfilechooser|tpopup)
    border_size=0
    center=1
    float=true
    no_anim=true
    pin=true
    size=monitor_w*0.9 monitor_h*0.9
    stay_focused=true
}
windowrule {
    name=window mordith has to tile
    match:class=mordith
    tile=true
}
windowrule {
    name=anki rules
    match:class=anki
    tile=true
    workspace=6
}
windowrule {
    name=pinentry stuff
    match:class=Pinentry-gtk
    pin=on
    stay_focused=true
    no_screen_share=true
}

bind = $mod, Q, exec, systemctl sleep
bind = $mod, T, togglefloating,
bind = $mod, W, killactive,
bind = $mod, RETURN, fullscreen,
bind = $mod CTRL SHIFT ALT, ESCAPE, exec, loginctl kill-user $(whoami)
bind = $mod, SPACE, exec, pkill fuzzel || fuzzel
bind = $mod, P, exec, $passwords
bind = $mod, O, exec, $supermenu
bind = $mod, C, exec, $color_picker
bind = $mod, X, exec, $screenshot output
bind = $mod, H, exec, $firefox_history
bind = $mod, BACKSPACE, exec, footclient
bind = $mod, M, exec, footclient -T rmpc -a rmpc rmpc

bind = $mod ALT, H, exec, $HOME/.config/tmux/projects.sh home_session
bind = ALT, P, exec, $HOME/.config/tmux/projects.sh projects
bind = ALT, U, exec, $HOME/.config/tmux/projects.sh gitweb
bind = ALT, T, exec, $HOME/.config/tmux/projects.sh panes
bind = ALT, G, exec, footclient -T tpopup -a tpopup $HOME/.config/tmux/projects.sh git
bind = ALT, B, exec, footclient -T btop -a btop btop
bind = ALT, Y, exec, footclient -T yazi -a yazi yazi

binde = $mod, U, exec, $cyclewall -w $wallpaper_directory
binde = $mod SHIFT, U, exec, $cyclewall -w $wallpaper_directory -r
bind = $mod ALT, U, exec, $cyclewall -w $wallpaper_directory -s $default_wallpaper
binde = $mod CTRL, U, exec, $cyclewall -w $wallpaper_directory -R

bind = $mod, S, workspace, 1
bind = $mod, D, workspace, 2
bind = $mod, F, workspace, 3
bind = $mod, J, workspace, 4
bind = $mod, K, workspace, 5
bind = $mod, L, workspace, 6

bind = $mod ALT, S, movetoworkspace, 1
bind = $mod ALT, D, movetoworkspace, 2
bind = $mod ALT, F, movetoworkspace, 3
bind = $mod ALT, J, movetoworkspace, 4
bind = $mod ALT, K, movetoworkspace, 5
bind = $mod ALT, L, movetoworkspace, 6

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod ALT, 1, movetoworkspace, 1
bind = $mod ALT, 2, movetoworkspace, 2
bind = $mod ALT, 3, movetoworkspace, 3
bind = $mod ALT, 4, movetoworkspace, 4
bind = $mod ALT, 5, movetoworkspace, 5
bind = $mod ALT, 6, movetoworkspace, 6
bind = $mod ALT, 7, movetoworkspace, 7
bind = $mod ALT, 8, movetoworkspace, 8
bind = $mod ALT, 9, movetoworkspace, 9

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 1%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume -l 0.0 @DEFAULT_AUDIO_SINK@ 1%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindl = , Print, exec, $screenshot output
bindl = , XF86Tools, exec, pkill fuzzel || fuzzel
bindl = , XF86AudioPlay, exec, rmpc togglepause
bindl = , XF86AudioPrev, exec, rmpc prev
bindl = , XF86AudioNext, exec, rmpc next

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

gesture = 3, horizontal, workspace

workspace = 1, monitor:DP-2
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-2
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-5
