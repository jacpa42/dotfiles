$terminal = ghostty
$search_engine = firefox
$menu = ~/.config/hypr/wofi.sh
$spotify_playpause = playerctl --player=spotify play-pause
$next_wallpaper = playerctl --player=spotify play-pause
$spotify_next = playerctl --player=spotify next
$spotify_previous = playerctl --player=spotify previous
$increase_volume = wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%+
$decrease_volume = wpctl set-volume @DEFAULT_AUDIO_SINK@ 3%-
$cursor_theme = catppuccin-mocha-mauve-cursors
$mute_volume = wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
$max_volume = wpctl set-volume @DEFAULT_AUDIO_SINK@ 100%

env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = HYPRCURSOR_THEME, $cursor_theme
env = HYPRCURSOR_SIZE, 32
env = XCURSOR_THEME, $cursor_theme
env = XCURSOR_SIZE, 32
env = QT_QPA_PLATFORMTHEME, qt6ct
env = VISUAL, nvim
env = EDITOR, nvim

monitor=eDP-1,2560x1440@165,0x0,1
monitor=HDMI-A-1,1920x1080@60,0x1440,1

ecosystem:no_update_news = true

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = copyq --start-server & /usr/lib/polkit-kde-authentication-agent-1 & /usr/bin/alsactl restore
exec-once = hypridle & gsettings set org.gnome.desktop.interface cursor_theme \'$cursor_theme\' 
exec-once = swww-daemon & ~/.config/hypr/wallpaper_switcher.sh ~/Pictures/Wallpapers
exec-once = $terminal -e tmux

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    follow_mouse = 1
    touchpad {
				natural_scroll = no
    }
    sensitivity = 0

    repeat_rate = 50
    repeat_delay = 200
}

general {
    gaps_in = 6 
    gaps_out = 12
    border_size = 3
    col.active_border = rgba(ed8796ee) rgba(f08796ee) 20deg
    col.inactive_border = rgba(24253799)

    layout = master
    allow_tearing = true
}

master {
  new_on_top = true
  new_status = master
  orientation = right
  mfact = 0.7
}

env = WLR_DRM_NO_ATOMIC,1

decoration {
    rounding = 0
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.8, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

misc {
    force_default_wallpaper = 0
}

device {
    name = epic-mouse-v1
    sensitivity = 0
}

cursor {
  hide_on_key_press = true
}


windowrulev2 = suppressevent maximize, class:.* 
windowrule=workspace [magic],^(spotify)$
windowrulev2 = immediate, class:^(sekiro)$
windowrulev2 = tile, class:.*

$mainMod = SUPER

bind = $mainMod, G, exec, $terminal
bind = $mainMod, H, exec, $search_engine
bind = $mainMod, D, killactive,
bind = $mainMod, F, fullscreen,
bind = $mainMod, T, togglefloating,
bind = $mainMod, DELETE, exit,
bind = $mainMod, RETURN, exec, $menu


bind = $mainMod, J, layoutmsg, rollnext
bind = $mainMod, K, layoutmsg, cyclenext
bind = $mainMod, L, layoutmsg, mfact +0.05
bind = $mainMod, P, layoutmsg, mfact -0.05


bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10


bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, C, exec, grim -g "$(slurp)" | wl-copy

bind = $mainMod ALT, 0, exec, grim -g "$(slurp)" | wl-copy
bind = $mainMod ALT, 1, exec, $spotify_playpause
bind = $mainMod ALT, 2, exec, $spotify_next
bind = $mainMod ALT, 3, exec, $spotify_previous
bind = $mainMod ALT, 4, exec, $decrease_volume
bind = $mainMod ALT, 5, exec, $increase_volume
bind = $mainMod ALT, 6, exec, $mute_volume
bind = $mainMod ALT, 7, exec, $max_volume

bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
